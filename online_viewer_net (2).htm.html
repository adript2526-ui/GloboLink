<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clasificación GloboLink</title>
  <style>
    :root{
      --bg1:#020617;
      --bg2:#0f172a;
      --panel:rgba(255,255,255,.08);
      --line:rgba(255,255,255,.12);
      --text:#e5e7eb;
      --muted:#94a3b8;
      --cyan:#22d3ee;
      --violet:#c084fc;
      --gold:#fbbf24;
      --green:#22c55e;
      --shadow:0 24px 70px rgba(0,0,0,.45);
    }
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    html,body{
      margin:0;
      min-height:100vh;
      overflow-y:scroll;
      overflow-x:hidden;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(34,211,238,.16), transparent 25%),
        radial-gradient(circle at top right, rgba(192,132,252,.16), transparent 25%),
        linear-gradient(140deg, #020617, #0a1020 45%, #111827);
    }
    body::before{
      content:"";
      position:fixed;
      inset:-20%;
      background:
        radial-gradient(circle, rgba(34,211,238,.07) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(192,132,252,.07) 0 2px, transparent 3px);
      background-size:44px 44px, 58px 58px;
      background-position:0 0, 20px 20px;
      opacity:.28;
      pointer-events:none;
      animation: drift 18s linear infinite;
    }
    @keyframes drift{from{transform:translateY(0)}to{transform:translateY(-40px)}}
    .wrap{
      width:min(100%,1200px);
      min-height:100vh;
      margin:0 auto;
      padding:24px;
      display:flex;
      flex-direction:column;
      gap:18px;
      position:relative;
      z-index:1;
    }
    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:16px;
      flex-wrap:wrap;
      padding:22px 24px;
      border:1px solid var(--line);
      border-radius:30px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
    }
    .title{
      margin:0;
      font-size:clamp(2rem,4vw,4rem);
      letter-spacing:-.05em;
      text-transform:uppercase;
      line-height:1;
    }
    .subtitle{
      margin:10px 0 0;
      color:var(--muted);
      font-size:clamp(.95rem,1.4vw,1.1rem);
    }
    .badge{
      padding:12px 16px;
      border-radius:999px;
      background:rgba(34,211,238,.10);
      border:1px solid rgba(34,211,238,.18);
      color:#d7fbff;
      font-weight:800;
      white-space:nowrap;
    }
    .grid{
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:18px;
      flex:1;
      min-height:0;
    }
    .panel{
      border:1px solid var(--line);
      border-radius:30px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.035));
      box-shadow:var(--shadow);
      backdrop-filter:blur(14px);
      overflow:hidden;
    }
    .panel-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 20px;
      border-bottom:1px solid rgba(255,255,255,.06);
      background:rgba(255,255,255,.03);
    }
    .panel-head strong{
      font-size:1rem;
      text-transform:uppercase;
      letter-spacing:.08em;
    }
    .panel-body{padding:18px 20px}
    .rank-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .rank-item{
      display:grid;
      grid-template-columns:70px 1fr 130px;
      gap:12px;
      align-items:center;
      padding:16px 18px;
      border-radius:22px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
    }
    .pos{
      width:58px;
      height:58px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:1.4rem;
      font-weight:950;
      color:#041018;
      background:linear-gradient(135deg, var(--gold), #f59e0b);
    }
    .pos.p2{background:linear-gradient(135deg, #cbd5e1, #94a3b8)}
    .pos.p3{background:linear-gradient(135deg, #f59e0b, #fb923c)}
    .name{
      font-size:1.2rem;
      font-weight:900;
      line-height:1.1;
    }
    .meta{
      color:var(--muted);
      font-size:.92rem;
      margin-top:4px;
    }
    .score{
      text-align:right;
      font-size:1.9rem;
      font-weight:950;
      color:#fff;
    }
    .side{
      display:flex;
      flex-direction:column;
      gap:18px;
      min-height:0;
    }
    .stats{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }
    .stat{
      padding:18px 20px;
      border-radius:26px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
    }
    .stat .label{
      color:var(--muted);
      font-size:.9rem;
      text-transform:uppercase;
      letter-spacing:.08em;
    }
    .stat .value{
      margin-top:8px;
      font-size:2rem;
      font-weight:950;
    }
    .stat .value.cyan{color:var(--cyan)}
    .stat .value.green{color:var(--green)}
    .stat .value.violet{color:var(--violet)}
    .footer{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      color:var(--muted);
      font-size:.92rem;
      padding:0 6px 6px;
    }
    .btn{
      border:0;
      padding:12px 16px;
      border-radius:16px;
      font-weight:900;
      cursor:pointer;
      background:linear-gradient(90deg, var(--cyan), var(--violet));
      color:#041018;
    }
    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .rank-item{grid-template-columns:56px 1fr 100px}
      .score{font-size:1.5rem}
    }
    @media (max-width:560px){
      .wrap{padding:14px}
      .header{padding:18px}
      .panel-head,.panel-body{padding:16px}
      .rank-item{grid-template-columns:52px 1fr}
      .score{grid-column:2; text-align:left}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1 class="title">Classificació</h1>
        <p class="subtitle">Rànquing general de GloboLink per mostrar a la fira.</p>
      </div>
      <div class="badge" id="lastUpdate">Actualitzat ara mateix</div>
    </div>

    <div class="grid">
      <section class="panel">
        <div class="panel-head">
          <strong>Top 10</strong>
          <span id="countLabel">0 jugadors</span>
        </div>
        <div class="panel-body">
          <div class="rank-list" id="ranking"></div>
        </div>
      </section>

      <aside class="side">
        <section class="panel">
          <div class="panel-head">
            <strong>Estadístiques</strong>
            <span>En directe</span>
          </div>
          <div class="panel-body stats">
            <div class="stat">
              <div class="label">Millor puntuació</div>
              <div class="value gold" id="bestScore">0</div>
            </div>
            <div class="stat">
              <div class="label">Participants totals</div>
              <div class="value cyan" id="totalPlayers">0</div>
            </div>
            <div class="stat">
              <div class="label">Mitjana</div>
              <div class="value violet" id="avgScore">0</div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <strong>Controls</strong>
            <span>Opcional</span>
          </div>
          <div class="panel-body">
            <button class="btn" id="clearBtn">Esborrar classificació</button>
          </div>
        </section>
      </aside>
    </div>

    <div class="footer">
      <div>Refresca automàticament cada 3 segons.</div>
      <div>Ideal per a pantalla gran o mode quiosc.</div>
    </div>
  </div>

  <script>
    const rankingEl = document.getElementById('ranking');
    const countLabel = document.getElementById('countLabel');
    const bestScoreEl = document.getElementById('bestScore');
    const totalPlayersEl = document.getElementById('totalPlayers');
    const avgScoreEl = document.getElementById('avgScore');
    const lastUpdateEl = document.getElementById('lastUpdate');

    function loadBoard(){
      const board = JSON.parse(localStorage.getItem('globolink_board') || '[]');
      board.sort((a,b)=>b.score-a.score);

      rankingEl.innerHTML = '';

      if(!board.length){
        rankingEl.innerHTML = '<div class="rank-item"><div class="name">Encara no hi ha dades</div><div class="meta">Juga una partida per omplir el rànquing</div><div class="score">—</div></div>';
        countLabel.textContent = '0 jugadors';
        bestScoreEl.textContent = '0';
        totalPlayersEl.textContent = '0';
        avgScoreEl.textContent = '0';
        lastUpdateEl.textContent = 'Sense dades';
        return;
      }

      const top = board.slice(0,10);
      const best = board[0].score;
      const avg = Math.round(board.reduce((sum,x)=>sum + Number(x.score || 0),0) / board.length);

      top.forEach((p, i) => {
        const item = document.createElement('div');
        item.className = 'rank-item';
        const posClass = i === 0 ? '' : i === 1 ? 'p2' : i === 2 ? 'p3' : '';
        const date = p.date ? new Date(p.date).toLocaleDateString('ca-ES') : '';
        item.innerHTML = `
          <div class="pos ${posClass}">${i+1}</div>
          <div>
            <div class="name">${p.name || 'Jugador'}</div>
            <div class="meta">${date}</div>
          </div>
          <div class="score">${p.score}</div>
        `;
        rankingEl.appendChild(item);
      });

      countLabel.textContent = `${board.length} jugadors`;
      bestScoreEl.textContent = best;
      totalPlayersEl.textContent = board.length;
      avgScoreEl.textContent = avg;
      lastUpdateEl.textContent = 'Actualitzat fa uns segons';
    }

    document.getElementById('clearBtn').addEventListener('click', () => {
      localStorage.removeItem('globolink_board');
      loadBoard();
    });

    loadBoard();
    setInterval(loadBoard, 3000);
  </script>
</body>
</html>
